services:
  # ---------------------------------------------------------------------------
  # BACKEND (.NET 9 API)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./SmartInvoice.API
      dockerfile: Dockerfile.dev
    container_name: smartinvoice-backend
    restart: always
    ports:
      - "5172:8080"
    volumes:
      - ./SmartInvoice.API:/app
      - /app/obj
      - /app/bin
    # Load environment variables from .env file
    env_file:
      - ./SmartInvoice.API/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=SmartInvoiceDb;Username=postgres;Password=yourdescription
      - DOTNET_WATCH_SUPPRESS_PROMPTS=1
      - OCR_API_ENDPOINT=http://smartinvoice-ocr:5000
      - AWS_SQS_OCR_URL=https://sqs.ap-southeast-1.amazonaws.com/212208750923/smartinvoice-ocr-queue
      - AWS_SQS_URL=https://sqs.ap-southeast-1.amazonaws.com/212208750923/smartinvoice-vietqr-queue
    depends_on:
      - postgres
    networks:
      - smartinvoice-network

  # ---------------------------------------------------------------------------
  # DATABASE (PostgreSQL)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: smartinvoice-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=yourdescription
      - POSTGRES_DB=SmartInvoiceDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - smartinvoice-network
  # ---------------------------------------------------------------------------
  # FRONTEND (React/Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./SmartInvoice.Frontend
      dockerfile: Dockerfile.dev
    container_name: smartinvoice-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./SmartInvoice.Frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:5172/api
    depends_on:
      - backend
    networks:
      - smartinvoice-network
  # ---------------------------------------------------------------------------
  # AI SERVICE (Python OCR)
  # ---------------------------------------------------------------------------
  smartinvoice-ocr:
    build:
      context: ./invoice_ocr
      dockerfile: Dockerfile
    container_name: smartinvoice-ocr
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DEVICE=cpu
      - HOST=0.0.0.0
      - PORT=5000
    volumes:
      - ./invoice_ocr:/app
    networks:
      - smartinvoice-network

networks:
  smartinvoice-network:
    driver: bridge

volumes:
  postgres_data:
